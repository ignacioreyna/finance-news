[sources.risk_country_jp_morgan]
connector = "finance_news.connectors.manual:ManualConnector"
base_url = "https://www.markets.jpmorgan.com"
frequency = "daily"
freshness = { ttl_seconds = 86400, freshness_tolerance_seconds = 172800 }
