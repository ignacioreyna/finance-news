# Versioned configuration for sources and series
#
# Environment variable placeholders are used for sensitive information:
# - ${BCRA_API_TOKEN}: BCRA API token
# - ${FRED_API_KEY}: Federal Reserve Economic Data API key
# - ${TREASURY_DTS_TOKEN}: US Treasury DTS access token
#
# Set these environment variables before running the pipeline.

version = "1.0"

[sources]

[sources.bcra]
connector = "finance_news.connectors.bcra:BCRAConnector"
base_url = "https://api.bcra.gob.ar"
frequency = "daily"
freshness = { ttl_seconds = 86400, freshness_tolerance_seconds = 86400 }
priority = "alta"
category = "primary"
enabled = true

[sources.indec]
connector = "finance_news.connectors.indec:INDECConnector"
base_url = "https://www.indec.gob.ar"
frequency = "monthly"
freshness = { ttl_seconds = 2592000, freshness_tolerance_seconds = 864000 }
priority = "alta"
category = "primary"
enabled = true

[sources.tesoro]
connector = "finance_news.connectors.tesoro:TesoroConnector"
base_url = "https://www.economia.gob.ar"
frequency = "weekly"
freshness = { ttl_seconds = 604800, freshness_tolerance_seconds = 1209600 }
priority = "alta"
category = "primary"
enabled = true

[sources.datos_gob_ar]
connector = "finance_news.connectors.datos_gob_ar:DatosGobArConnector"
base_url = "https://datos.gob.ar"
