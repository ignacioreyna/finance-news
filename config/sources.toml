[sources.opc]
connector = "finance_news.connectors.manual:ManualConnector"
base_url = "https://www.opc.gob.ar"
frequency = "monthly"
freshness = { ttl_seconds = 2592000, freshness_tolerance_seconds = 864000 }
priority = "media"
category = "manual"
enabled = true

[series]

[series.bcra_reservas]
source_id = "bcra"
path = "/estadisticas/v2/reservas"
filters = { currency = "usd" }

[series.bcra_tipo_cambio]
source_id = "bcra"
path = "/estadisticas/v2/tipos_cambio"
filters = { type = "oficial" }

[series.indec_ipc]
source_id = "indec"
path = "/estadisticas/ipc"
filters = { index = "general" }

[series.fomc_minutes]
source_id = "fomc"
path = "/newsevents/pressreleases/monetary"
filters = { document_type = "minutes" }

[series.bls_payrolls]
source_id = "bls"
path = "/news.release/empsit"
filters = { report_type = "employment" }