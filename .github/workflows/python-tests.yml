# Local verification (run this from repo root):
#   PYTHONPATH=src python3 -m unittest discover -s tests
#
# This CI workflow runs the same command that contributors can run locally.
# No pip install step is needed because this project uses only stdlib dependencies.

name: Python tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run tests
      run: PYTHONPATH=src python3 -m unittest discover -s tests